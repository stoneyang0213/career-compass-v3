# Career Compass v3 · Wrangler config
# 本地 dev 用 `wrangler pages dev`,会自动用 .wrangler/state/v3/d1/ 下的本地 SQLite。
# 生产部署时需在 CF dashboard 创建真正的 D1 database,再回填 database_id。
name = "career-compass-v3"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"                          # env.DB 在 /api/* 里访问
database_name = "career-compass-v3"
database_id = "3d52799a-f7bf-4891-a152-bbd21163939f"  # career-compass-v3 D1, APAC, 2026-05-27
